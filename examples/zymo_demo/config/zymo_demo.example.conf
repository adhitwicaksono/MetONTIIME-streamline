/*
================================================================================
MetONTIIME-streamline example configuration
Zymo demo dataset
================================================================================

This config is designed as a beginner-friendly example for the small Zymo ONT
full-length 16S demo FASTQ file.

Before running:
1. Move the demo FASTQ into:
   examples/zymo_demo/raw_fastq/

2. Edit the database paths below:
   params.dbSequencesFasta
   params.dbTaxonomyTsv

3. If you already have QIIME2 database artifacts, place them or configure them
   according to the current MetONTIIME database behavior.

Run from repository root:

nextflow -c examples/zymo_demo/config/zymo_demo.example.conf \
  run metontiime2.nf \
  -profile docker
*/

params {

    // -------------------------------------------------------------------------
    // Input and output paths
    // -------------------------------------------------------------------------

    // In the original MetONTIIME pipeline, workDir means the FASTQ input folder.
    // In MetONTIIME-streamline documentation, this is treated as the input FASTQ directory.
    workDir = "examples/zymo_demo/raw_fastq"

    // Sample metadata file.
    // The current pipeline can auto-create metadata if missing, but explicit metadata is safer.
    sampleMetadata = "examples/zymo_demo/metadata/sample-metadata.tsv"

    // Output directory.
    resultsDir = "results/zymo_demo"

    // -------------------------------------------------------------------------
    // Database inputs
    // -------------------------------------------------------------------------

    // Reference database sequence FASTA.
    // Replace with your local SILVA/16S-compatible reference FASTA.
    dbSequencesFasta = "database/silva/silva-sequences.fasta"

    // Reference database taxonomy TSV.
    // Replace with your local SILVA/16S-compatible taxonomy TSV.
    dbTaxonomyTsv = "database/silva/silva-taxonomy.tsv"

    // Names for QIIME2 database artifacts created inside resultsDir/importDb.
    dbSequencesQza = "db_sequences.qza"
    dbTaxonomyQza = "db_taxonomy.qza"

    // -------------------------------------------------------------------------
    // Taxonomy assignment
    // -------------------------------------------------------------------------

    // Available in the original pipeline: VSEARCH, Blast
    classifier = "VSEARCH"

    // Maximum number of candidate hits for consensus taxonomy assignment.
    maxAccepts = 3

    // Minimum fraction of assignments that must match top hit for consensus.
    minConsensus = 0.7

    // Minimum query coverage and identity for candidate hits.
    minQueryCoverage = 0.8
    minIdentity = 0.9

    // -------------------------------------------------------------------------
    // Read filtering
    // -------------------------------------------------------------------------

    // This demo filename suggests full-length 16S using 27F/1492R.
    // These are starter values, not universal defaults.
    minReadLength = 1200
    maxReadLength = 1700

    // Minimum average PHRED score for retained reads.
    minQual = 10

    // Trim this many bases from both ends.
    extraEndsTrim = 20

    // -------------------------------------------------------------------------
    // Downsampling and clustering
    // -------------------------------------------------------------------------

    // For this demo file, the filename says 1000 reads.
    // Setting maxNumReads above 1000 should avoid reducing it further.
    maxNumReads = 50000

    // De novo clustering identity.
    // The original config uses 1.0. For ONT benchmarking, compare 1.0, 0.99, and 0.97.
    clusteringIdentity = 1.0

    // -------------------------------------------------------------------------
    // Diversity analysis
    // -------------------------------------------------------------------------

    // Taxonomy level for non-phylogenetic diversity analysis.
    // Level 6 often approximates genus-level for many bacterial taxonomies,
    // depending on database formatting.
    taxaLevelDiversity = 6

    // Sampling depth for diversity analysis.
    // For this tiny demo, keep this low.
    numReadsDiversity = 100

    // -------------------------------------------------------------------------
    // Optional taxa filtering
    // -------------------------------------------------------------------------

    taxaOfInterest = ""
    minNumReadsTaxaOfInterest = 1

    // -------------------------------------------------------------------------
    // Help and pipeline step switches
    // -------------------------------------------------------------------------

    help = false

    // The demo FASTQ is already a FASTQ file, not barcode directories.
    concatenateFastq = false

    filterFastq = true
    downsampleFastq = true
    importFastq = true
    dataQC = true
    importDb = true
    derepSeq = true
    assignTaxonomy = true
    taxonomyVisualization = true
    collapseTables = true
    filterTaxa = false
    diversityAnalyses = true
}

tower {
    enabled = false
    endpoint = '-'
    accessToken = 'nextflowTowerToken'
}

/*
================================================================================
Container profiles

These profiles are adapted from the original MetONTIIME configuration.

Important:
The original config binds /home into the container. If your files are outside /home,
for example under /mnt/c, /mnt/d, /media, /scratch, or an HPC storage location,
you may need to edit containerOptions.
================================================================================
*/

profiles {

    docker {
        docker.enabled = true
        docker.autoMounts = false

        process {
            container = 'maestsi/metontiime:latest'
            containerOptions = '-v /home/:/home'
            cpus = 1
            executor = 'local'
            perJobMemLimit = true

            withName:concatenateFastq {
                cpus = { params.concatenateFastq ? 6 : 1 }
                memory = { params.concatenateFastq ? 10.GB + (2.GB * (task.attempt-1)) : 1.GB }
                errorStrategy = { task.exitStatus == 130 ? 'retry' : 'terminate' }
                maxRetries = 3
            }

            withName:filterFastq {
                cpus = { params.filterFastq ? 6 : 1 }
                memory = { params.filterFastq ? 5.GB + (2.GB * (task.attempt-1)) : 1.GB }
                errorStrategy = { task.exitStatus == 130 ? 'retry' : 'terminate' }
                maxRetries = 3
            }

            withName:downsampleFastq {
                cpus = { params.downsampleFastq ? 6 : 1 }
                memory = { params.downsampleFastq ? 10.GB + (2.GB * (task.attempt-1)) : 1.GB }
                errorStrategy = { task.exitStatus == 130 ? 'retry' : 'terminate' }
                maxRetries = 3
            }

            withName:importFastq {
                cpus = { params.importFastq ? 6 : 1 }
                memory = { params.importFastq ? 10.GB + (2.GB * (task.attempt-1)) : 1.GB }
                errorStrategy = { task.exitStatus == 130 ? 'retry' : 'terminate' }
                maxRetries = 3
            }

            withName:dataQC {
                cpus = { params.dataQC ? 6 : 1 }
                memory = { params.dataQC ? 10.GB + (2.GB * (task.attempt-1)) : 1.GB }
                errorStrategy = { task.exitStatus == 130 ? 'retry' : 'terminate' }
                maxRetries = 3
            }

            withName:importDb {
                cpus = { params.importDb ? 6 : 1 }
                memory = { params.importDb ? 10.GB + (2.GB * (task.attempt-1)) : 1.GB }
                errorStrategy = { task.exitStatus == 130 ? 'retry' : 'terminate' }
                maxRetries = 3
            }

            withName:derepSeq {
                cpus = { params.derepSeq ? 6 : 1 }
                memory = { params.derepSeq ? 100.GB + (2.GB * (task.attempt-1)) : 1.GB }
                errorStrategy = { task.exitStatus == 130 ? 'retry' : 'terminate' }
                maxRetries = 3
            }

            withName:assignTaxonomy {
                cpus = { params.assignTaxonomy ? 6 : 1 }
