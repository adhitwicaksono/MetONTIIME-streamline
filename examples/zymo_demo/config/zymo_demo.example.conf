                errorStrategy = { task.exitStatus == 130 ? 'retry' : 'terminate' }
                maxRetries = 3
            }
        }
    }

    singularity {
        singularity.enabled = true
        singularity.autoMounts = false

        process {
            container = 'maestsi/metontiime:latest'
            containerOptions = '--bind /home/:/home'
            cpus = 1
            executor = 'local'
